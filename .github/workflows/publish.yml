name: Publish Honey to NPM registry

permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  number_of_files_changeset_folder: 0

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          # REMOVED: registry-url (This prevents setup-node from forcing NODE_AUTH_TOKEN)

      - name: Upgrade npm
        run: npm install -g npm@latest

      # REMOVED: npm config delete //registry.npmjs.org/:_authToken (No longer needed)

      - run: echo "GH_TOKEN=${{ secrets.NPM_TOKEN }}" >> .env.yarn
      - name: Enable Corepack
        run: corepack enable
      - run: yarn install
      - run: yarn test
      - run: yarn build
      - name: Cleanup tokens
        run: rm .env.yarn .yarnrc.yml

      # Optional optimization: Ensure registry is explicitly public for the scoped package
      - name: Change package name for NPM
        run: |
          jq '.name = "@promind/honey" | .publishConfig = {"access": "public"}' package.json > temp.json && mv temp.json package.json

      - name: Publish to NPM
        run: npm publish --provenance
